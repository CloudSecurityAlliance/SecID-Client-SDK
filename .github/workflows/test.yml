name: Test

# Runs the fixture-driven test suite across all three language implementations
# (Python, TypeScript, Go). Each implementation reads the shared tests/fixtures.json
# and runs the same 21 behavioral test cases against a per-language mock server.
#
# The shared-fixtures pattern is the SDK's main quality safeguard: identical
# expected behavior across languages means drift between Python, TypeScript,
# and Go implementations is caught immediately. This workflow is what makes
# that safeguard actually run on every change.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: pytest test_secid_client.py -v

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run tests
        run: npm test

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run tests
        run: go test -v ./...
